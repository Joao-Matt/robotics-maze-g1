planner_server:
  ros__parameters:
    use_sim_time: true
    planner_plugins: [GridBased]
    GridBased: {plugin: nav2_navfn_planner/NavfnPlanner, tolerance: 2.0, use_astar: true, allow_unknown: true}
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    odom_topic: /odom
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    controller_plugins: [FollowPath]
    goal_checker_plugins: [general_goal_checker]
    progress_checker_plugin: progress_checker
    progress_checker: {plugin: nav2_controller::SimpleProgressChecker, required_movement_radius: 0.15, movement_time_allowance: 20.0}
    # Exploration goals are positions, not headings.  Requiring a final in-place
    # humanoid rotation can turn a reached frontier into a wall contact.
    general_goal_checker: {plugin: nav2_controller::SimpleGoalChecker, xy_goal_tolerance: 1.0, yaw_goal_tolerance: 3.14159, stateful: true}
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      min_vel_x: 0.0
      max_vel_x: 0.3
      max_vel_y: 0.0
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.3
      min_speed_theta: 0.0
      acc_lim_x: 2.0
      acc_lim_theta: 1.2
      decel_lim_x: -2.0
      decel_lim_theta: -1.5
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 40
      sim_time: 1.0
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 2.0
      critics: [Oscillation, BaseObstacle, GoalAlign, PathAlign, PathDist, GoalDist]
      BaseObstacle.scale: 32.00
      PathAlign.scale: 6.0
      PathAlign.forward_point_distance: 0.60
      GoalAlign.scale: 8.0
      GoalAlign.forward_point_distance: 0.60
      PathDist.scale: 8.0
      GoalDist.scale: 6.0
bt_navigator:
  ros__parameters: {use_sim_time: true, global_frame: map, robot_base_frame: base_link, odom_topic: /odom, bt_loop_duration: 10, default_server_timeout: 20}
behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    behavior_plugins: [backup, wait]
    backup: {plugin: nav2_behaviors/BackUp}
    wait: {plugin: nav2_behaviors/Wait}
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      robot_radius: 0.45
      rolling_window: true
      width: 80
      height: 80
      track_unknown_space: true
      transform_tolerance: 2.0
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer: {plugin: nav2_costmap_2d::StaticLayer, map_subscribe_transient_local: true}
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        observation_sources: scan
        scan: {topic: /scan, clearing: true, marking: true, data_type: LaserScan, raytrace_max_range: 40.0, obstacle_max_range: 40.0}
      inflation_layer: {plugin: nav2_costmap_2d::InflationLayer, inflation_radius: 0.5, cost_scaling_factor: 0.35}
      always_send_full_costmap: true
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 8
      height: 8
      resolution: 0.05
      update_frequency: 5.0
      publish_frequency: 2.0
      robot_radius: 0.45
      transform_tolerance: 2.0
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer: {plugin: nav2_costmap_2d::StaticLayer, map_subscribe_transient_local: true}
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        observation_sources: scan
        scan: {topic: /scan, clearing: true, marking: true, data_type: LaserScan, raytrace_max_range: 40.0, obstacle_max_range: 40.0}
      inflation_layer: {plugin: nav2_costmap_2d::InflationLayer, inflation_radius: 0.5, cost_scaling_factor: 0.35}
      always_send_full_costmap: true
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: [planner_server, controller_server, bt_navigator, behavior_server]
