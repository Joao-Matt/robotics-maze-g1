explore_node:
  ros__parameters:
    use_sim_time: true
    # The D435i is forward-only, so the dynamic SLAM grid can begin a few cm in
    # front of base_link. This child frame is still rigidly attached to G1 but
    # guarantees m-explore's BFS seed lies inside genuinely observed free space.
    robot_base_frame: exploration_search_origin
    costmap_topic: /map
    costmap_updates_topic: /map_updates
    visualize: true
    planner_frequency: 0.5
    progress_timeout: 35.0
    potential_scale: 3.0
    orientation_scale: 0.0
    # Prefer the reachable frontier requiring the smallest absolute change
    # from the robot's current heading. Distance/gain breaks exact ties only.
    prefer_minimum_turn: true
    # Send Nav2 a rolling local lookahead toward the selected frontier instead
    # of the frontier centroid far inside unknown space.
    max_frontier_goal_distance: 3.8
    gain_scale: 1.0
    min_frontier_size: 0.5
    return_to_init: false
