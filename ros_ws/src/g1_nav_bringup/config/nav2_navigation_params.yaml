planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 2.0
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.35
      use_astar: true
      allow_unknown: true
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    odom_topic: /odom
    controller_plugins: [FollowPath]
    goal_checker_plugins: [general_goal_checker]
    progress_checker_plugin: progress_checker
    progress_checker: {plugin: nav2_controller::SimpleProgressChecker, required_movement_radius: 0.15, movement_time_allowance: 15.0}
    general_goal_checker: {plugin: nav2_controller::SimpleGoalChecker, xy_goal_tolerance: 0.35, yaw_goal_tolerance: 0.5, stateful: true}
    FollowPath:
      plugin: dwb_core::DWBLocalPlanner
      min_vel_x: 0.0
      max_vel_x: 0.20
      max_vel_y: 0.0
      max_vel_theta: 0.40
      min_speed_xy: 0.0
      max_speed_xy: 0.20
      min_speed_theta: 0.0
      acc_lim_x: 0.30
      acc_lim_theta: 0.60
      decel_lim_x: -0.30
      decel_lim_theta: -0.60
      vx_samples: 10
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 1.5
      transform_tolerance: 1.0
      critics: [RotateToGoal, Oscillation, BaseObstacle, GoalAlign, PathAlign, PathDist, GoalDist]
      BaseObstacle.scale: 0.05
      PathAlign.scale: 24.0
      GoalAlign.scale: 18.0
      PathDist.scale: 24.0
      GoalDist.scale: 18.0
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    behavior_plugins: [spin, backup, wait]
    spin: {plugin: nav2_behaviors/Spin}
    backup: {plugin: nav2_behaviors/BackUp}
    wait: {plugin: nav2_behaviors/Wait}
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.10
      robot_radius: 0.45
      transform_tolerance: 1.0
      track_unknown_space: true
      plugins: [static_layer, obstacle_layer, inflation_layer]
      static_layer: {plugin: nav2_costmap_2d::StaticLayer, map_subscribe_transient_local: true}
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        observation_sources: scan
        scan: {topic: /scan, max_obstacle_height: 2.0, clearing: true, marking: true, data_type: LaserScan, raytrace_max_range: 8.0, obstacle_max_range: 8.0}
      inflation_layer: {plugin: nav2_costmap_2d::InflationLayer, inflation_radius: 0.55, cost_scaling_factor: 3.0}
      always_send_full_costmap: true
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.10
      update_frequency: 5.0
      publish_frequency: 2.0
      robot_radius: 0.45
      transform_tolerance: 1.0
      plugins: [obstacle_layer, inflation_layer]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        observation_sources: scan
        scan: {topic: /scan, min_obstacle_height: 0.0, max_obstacle_height: 3.0, clearing: true, marking: true, data_type: LaserScan, raytrace_max_range: 8.0, obstacle_max_range: 8.0}
      inflation_layer: {plugin: nav2_costmap_2d::InflationLayer, inflation_radius: 0.55, cost_scaling_factor: 3.0}
      always_send_full_costmap: true
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: [map_server, planner_server, controller_server, bt_navigator, behavior_server]
