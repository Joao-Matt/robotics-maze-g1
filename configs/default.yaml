project:
  name: robotics-maze-g1

sim:
  timestep: 0.002
  control_dt: 0.02
  default_duration_s: 3.0
  max_episode_time_s: 180

maze:
  # Square physical maze cells. Sweep cell_size_m/cell_width_m/cell_length_m
  # together from 1 m to 4 m.
  cell_size_m: 2.0
  cell_width_m: 2.0
  cell_length_m: 2.0
  width_cells: 15
  height_cells: 15
  wall_height_m: 1.2
  wall_thickness_m: 0.12
  min_corridor_width_m: 1.0
  max_corridor_width_m: 4.0

robot:
  model_xml_path: third_party/unitree_rl_gym/resources/robots/g1_description/scene.xml
  base_model_xml_path: third_party/unitree_rl_gym/resources/robots/g1_description/g1_12dof.xml
  initial_keyframe:
  initial_base_height_m: 0.793
  safety_radius_m: 0.45
  goal_tolerance_m: 0.5
  max_forward_speed_mps: 0.75
  max_yaw_rate_radps: 0.75

d435i:
  enabled: true
  parent_body: pelvis
  link_name: d435i_link
  rgb_camera_name: d435i_rgb
  depth_camera_name: d435i_depth
  rgb_optical_frame: d435i_rgb_optical_frame
  depth_optical_frame: d435i_depth_optical_frame
  imu_frame: d435i_imu_frame
  mount_pos_m: [0.08, 0.0, 0.34]
  pitch_deg: 10.0
  width: 640
  height: 480
  rgb_fovy_deg: 42.0
  depth_fovy_deg: 58.0
  depth_visual_min_m: 0.15
  depth_visual_max_m: 8.0

livox_mid360:
  enabled: true
  frame_id: livox_mid360_frame
  mount_pos_m: [0.05, 0.0, 0.29]
  scan_rate_hz: 10.0
  horizontal_bins: 720
  range_min_m: 0.10
  range_max_m: 40.0

oracle:
  planner: bfs
  approach_tolerance_m: 0.35
  waypoint_tolerance_m: 0.75
  goal_tolerance_m: 0.5
  heading_threshold_rad: 0.45
  forward_speed_mps: 1
  arc_turn_speed_mps: 0.8
  turn_start_distance_m: 0.8
  pre_turn_distance_m: 0.8
  arc_turn_forward_speed_mps: 0.4
  arc_turn_yaw_rate_radps: 0.8
  post_turn_heading_tolerance_rad: 0.3
  heading_gain: 1.4
  max_yaw_rate_radps: 0.8
  stuck_timeout_s: 8.0
  stuck_min_progress_m: 0.08
  max_recovery_attempts: 2
  turn_penalty_cost: 2.0

logging:
  output_root: runs
  state_rate_hz: 50
  sensor_rate_hz: 10

locomotion_sandbox:
  max_forward_speed_mps: 0.25
  max_lateral_speed_mps: 0.15
  max_yaw_rate_radps: 0.5
  command_timeout_s: 0.5
  control_rate_hz: 50
  render_width: 640
  render_height: 480
  fall_min_base_height_m: 0.45
  fall_max_tilt_rad: 0.9
  recording_fps: 30
  command_step_fraction: 0.2

nav2_navigation:
  locomotion_policy: unitree_rl_gym_native
  # Fixed spawn fixture orientation; never inferred from the generated route.
  initial_spawn_yaw_rad: -1.5707963267948966
  # These limits are rendered into Nav2 and mirrored by the MuJoCo command bridge.
  max_forward_mps: 0.45
  min_forward_mps: 0.12
  max_reverse_mps: -0.30
  max_yaw_rate_radps: 1.20
  min_yaw_rate_radps: 0.00
  # Calibration measures the open-floor physical envelope. Nav2 uses a maze
  # envelope derived from it so wall-proximal control stays smooth.
  calibrated_nav2_forward_scale: 0.75
  calibrated_nav2_yaw_rate_scale: 0.65
  calibrated_nav2_max_forward_mps: 0.80
  calibrated_nav2_max_yaw_rate_radps: 1.20
  turn_slowdown_start_radps: 0.45
  turn_slowdown_full_radps: 1.10
  turn_slowdown_min_forward_mps: 0.12
  max_linear_accel_mps2: 2.00
  max_linear_decel_mps2: 2.00
  max_yaw_accel_radps2: 1.20
  max_yaw_decel_radps2: 1.50
  controller_frequency_hz: 10.0
  dwb_sim_time_s: 1.0
  dwb_vx_samples: 20
  dwb_vtheta_samples: 40
  dwb_linear_granularity_m: 0.05
  dwb_angular_granularity_rad: 0.025
  dwb_forward_point_distance_m: 0.60
  costmap_resolution_m: 0.05
  costmap_robot_radius_m: 0.45
  # Rendered per run as inflation_radius_m = cell_width_m * this fraction.
  # Keep the inflated band narrow enough that the robot can recover near walls
  # in 2-4 m maze corridors instead of treating most of the corridor as blocked.
  inflation_radius_cell_width_fraction: 0.25
  inflation_radius_m: 0.50
  inflation_cost_scaling: 0.35
  # Prefer clearance over tiny path-length savings. Inflation stays at 25% of
  # corridor width, so the local planner needs obstacle cost to dominate a
  # shortest path that skims the inflated band.
  obstacle_critic_scale: 32.00
  path_align_scale: 6.0
  goal_align_scale: 8.0
  path_dist_scale: 8.0
  goal_dist_scale: 6.0
  command_timeout_s: 1.20
  wall_contact_abort_s: 0.50
  stuck_timeout_s: 12.0
  stuck_min_progress_m: 0.08
  # End the run when Nav2 keeps commanding motion but MuJoCo ground truth has
  # not translated or rotated enough for this long.
  commanded_stuck_timeout_s: 30.0
  commanded_stuck_min_translation_m: 0.08
  commanded_stuck_min_yaw_rad: 0.10
